body:
  text: 需第五乾下坎上需有孚光亨貞吉利涉大川彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也象曰雲上於天需君子以飲食宴樂初九需于郊利用恆無咎象曰需于郊不犯難行也利用恆無咎未失常也九二需于沙小有言終吉象曰需于沙行在中也雖小有言以吉終也九三需于泥致寇至象曰需于泥災在外也自我致寇敬慎不敗也六四需于血出自穴象曰需于血順以聽也九五需于酒食貞吉象曰酒食貞吉以中正也上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉也雖不當位未大失也
