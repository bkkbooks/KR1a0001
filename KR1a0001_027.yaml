body:
  text: 頤第二十七震下艮上頤貞吉觀頤自求口實彖曰頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頤之時大矣哉象曰山下有雷頤君子以慎言語節飲食初九舍爾靈龜觀我朵頤凶象曰觀我朵頤亦不足貴也六二顛頤拂經于丘頤征凶象曰六二征凶行失類也六三拂頤貞凶十年勿用无攸利象曰十年勿用道大悖也六四顛頤吉虎視眈眈其欲逐逐无咎象曰顛頤之吉上施光也六五拂經居貞吉不可涉大川象曰居貞之吉順以從上也上九由頤厲吉利涉大川象曰由頤厲吉大有慶也
