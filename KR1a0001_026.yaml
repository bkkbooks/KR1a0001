body:
  text: 大畜第二十六乾下艮上大畜利貞不家食吉利涉大川彖曰大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也象曰天在山中大畜君子以多識前言往行以畜其德初九有厲利己象曰有厲利己不犯災也九二輿說輹象曰輿說輹中無尤也九三良馬逐利艱貞曰間輿衛利有攸往象曰利有攸往上合志也六四童牛之牿元吉象曰六四元吉有喜也六五豶豕之牙吉象曰六五之吉有慶也上九何天之衢亨象曰何天之衢道大行也
