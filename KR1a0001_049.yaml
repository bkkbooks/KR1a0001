body:
  text: 革第四十九離下兌上革巳日乃孚元亨利貞悔亡彖曰革水火相息二女同居其志不相得曰革巳日乃孚革而信之文明以説大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉象曰澤中有火革君子以治曆明時初九鞏用黃牛之革象曰鞏用黃牛不可以有為也六二巳日乃革之征吉無咎象曰巳日革之行有嘉也九三征凶貞厲革言三就有孚象曰革言三就又何之矣九四悔亡有孚改命吉象曰改命之吉信志也九五大人虎變未占有孚象曰大人虎變其文炳也上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也
