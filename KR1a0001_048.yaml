body:
  text: 井第四十八巽下坎上井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也往來井井汔至亦未繘井未有功也羸其瓶是以凶也象曰木上有水井君子以勞民勸相初六井泥不食舊井無禽象曰井泥不食下也舊井無禽時舍也九二井谷射鮒甕敝漏象曰井谷射鮒無與也九三井泄不食為我心惻可用汲王明並受其福象曰井泄不食行惻也求王明受福也六四井甃無咎象曰井甃無咎修井也九五井洌寒泉食象曰寒泉之食中正也上六井收勿幕有孚元吉象曰元吉在上大成也
