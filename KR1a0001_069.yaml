body:
  text: 雜卦乾剛坤柔比樂師憂臨觀之義或與或求屯見而不失其居蒙雜而著震起也艮止也損益盛衰之始也大畜時也無妄災也萃聚而升不來也謙輕而豫怠也噬嗑食也賁無色也兌見而巽伏也隨無故也蠱則飭也剝爛也復反也晉晝也明夷誅也井通而困相遇也咸速也恆久也渙離也節止也解緩也蹇難也睽外也家人內也否泰反其類也大壯則止遁則退也大有衆也同人親也革去故也鼎取新也小過過也中孚信也豐多故也親寡旅也離上而坎下也小畜寡也履不處也需不進也訟不親也大過顛也姤遇也柔遇剛也漸女歸待男行也頤養正也既濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也
