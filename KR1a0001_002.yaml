body:
  text: 坤第二坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆含弘光大品物咸亨牝馬地類行地無疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地無疆象曰地勢坤君子以厚德載物初六履霜堅冰至象曰履霜堅冰陰始凝也馴致其道至堅冰也六二直方大不習無不利象曰六二之動直以方也不習無不利地道光也六三含章可貞或從王事無成有終象曰含章可貞以時發也或從王事知光大也六四括囊無咎無譽象曰括囊無咎慎不害也六五黃裳元吉象曰黃裳元吉文在中也上六龍戰于野其血玄黃象曰龍戰于野其道窮也用六利永貞象曰用六永貞以大終也文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅冰至蓋言順也直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也陰雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也君子黃中通理正位居體美在其中而暢於四支發於事業美之至也陰疑於陽必戰為其嫌於無陽也故稱龍焉猶未離其類也故稱血焉夫玄黃者天地之雜也天玄而地黃
