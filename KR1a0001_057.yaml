body:
  text: 巽第五十七巽下巽上巽小亨利有攸往利見大人彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人象曰隨風巽君子以申命行事初六進退利武人之貞象曰進退志疑也利武人之貞志治也九二巽在床下用史巫紛若吉無咎象曰紛若之吉得中也九三頻巽吝象曰頻巽之吝志窮也六四悔亡田獲三品象曰田獲三品有功也九五貞吉悔亡無不利無初有終先庚三日後庚三日吉象曰九五之吉位正中也上九巽在床下喪其資斧貞凶象曰巽在床下上窮也喪其資斧正乎凶也
