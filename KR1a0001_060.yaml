body:
  text: 節第六十兌下坎上節亨苦節不可貞彖曰節亨剛柔分而剛得中苦節不可貞其道窮也說以行險當位以節中正以通天地節而四時成節以制度不傷財不害民象曰澤上有水節君子以制數度議德行初九不出戶庭无咎象曰不出戶庭知通塞也九二不出門庭凶象曰不出門庭凶失時極也六三不節若則嗟若无咎象曰不節之嗟又誰咎也六四安節亨象曰安節之亨承上道也九五甘節吉往有尚象曰甘節之吉居位中也上六苦節貞凶悔亡象曰苦節貞凶其道窮也
