body:
  text: 習坎第二十九坎下坎上習坎有孚維心亨行有尚彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉象曰水洊至習坎君子以常德行習教事初六習坎入于坎窞凶象曰習坎入坎失道凶也九二坎有險求小得象曰求小得未出中也六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終無功也六四樽酒簋二用缶納約自牖終無咎象曰樽酒簋二剛柔際也九五坎不盈只既平無咎象曰坎不盈中未大也上六係用徽纆置于叢棘三歲不得凶象曰上六失道凶三歲也
