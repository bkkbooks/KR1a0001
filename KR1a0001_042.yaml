body:
  text: 益第四十二震下巽上益利有攸往利涉大川彖曰益損上益下民説無疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行益動而巽日進無疆天施地生其益無方凡益之道與時偕行象曰風雷益君子以見善則遷有過則改初九利用為大作元吉無咎象曰元吉無咎下不厚事也六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也六三益之用凶事無咎有孚中行告公用圭象曰益用凶事固有之也六四中行告公從利用為依遷國象曰告公從以益志也九五有孚惠心勿問元吉有孚惠我德象曰有孚惠心勿問之矣惠我德大得志也上九莫益之或擊之立心勿恆凶象曰莫益之偏辭也或擊之自外來也
