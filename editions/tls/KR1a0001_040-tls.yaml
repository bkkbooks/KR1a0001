body:
  text: 解第四十坎下震上解利西南无所往其來復吉有攸往夙吉彖曰解險以動動而免乎險解解利西南往得眾也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲坼解之時大矣哉象曰雷雨作解君子以赦過宥罪初六无咎象曰剛柔之際義无咎也九二田獲三狐得黃矢貞吉象曰九二貞吉得中道也六三負且乘致寇至貞吝象曰負且乘亦可醜也自我致戎又誰咎也九四解而拇朋至斯孚象曰解而拇未當位也六五君子維有解吉有孚于小人象曰君子有解小人退也上六公用射隼于高墉之上獲之无不利象曰公用射隼以解悖也
