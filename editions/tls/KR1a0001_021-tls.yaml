body:
  text: 噬嗑第二十一震下離上噬嗑亨利用獄彖曰頤中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也象曰雷電噬嗑先王以明罰勑法初九屨校滅趾无咎象曰屨校滅趾不行也六二噬膚滅鼻无咎象曰噬膚滅鼻乘剛也六三噬腊肉遇毒小吝无咎象曰遇毒位不當也九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也六五噬乾肉得黃金貞厲无咎象曰貞厲无咎得當也上九何校滅耳凶象曰何校滅耳聰不明也
