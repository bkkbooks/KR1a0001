body:
  text: 萃第四十五坤下兌上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往彖曰萃聚也順以說剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣象曰澤上於地萃君子以除戎器戒不虞初六有孚不終乃亂乃萃若號一握為笑勿恤往无咎象曰乃亂乃萃其志亂也六二引吉无咎孚乃利用禴象曰引吉无咎中未變也六三萃如嗟如无攸利往无咎小吝象曰往无咎上巽也九四大吉无咎象曰大吉无咎位不當也九五萃有位无咎匪孚元永貞悔亡象曰萃有位志未光也上六齎咨涕洟无咎象曰齎咨涕洟未安上也
