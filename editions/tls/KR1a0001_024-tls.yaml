body:
  text: 復第二十四震下坤上復亨出入无疾朋來无咎反復其道七日來復利有攸往彖曰復亨剛反動而以順行是以出入无疾朋來无咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎象曰雷在地中復先王以至日閉關商旅不行后不省方初九不遠復无祗悔元吉象曰不遠之復以脩身也六二休復吉象曰休復之吉以下仁也六三頻復厲无咎象曰頻復之厲義无咎也六四中行獨復象曰中行獨復以從道也六五敦復无悔象曰敦復无悔中以自考也上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也
