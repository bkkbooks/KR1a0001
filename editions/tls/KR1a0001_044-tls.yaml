body:
  text: 姤第四十四巽下乾上姤女壯勿用取女彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉象曰天下有風姤后以施命誥四方初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅象曰繫于金柅柔道牽也九二包有魚无咎不利賓象曰包有魚義不及賓也九三臀无膚其行次且厲无大咎象曰其行次且行未牽也九四包无魚起凶象曰无魚之凶遠民也九五以杞包瓜含章有隕自天象曰九五含章中正也有隕自天志不舍命也上九姤其角吝无咎象曰姤其角上窮吝也
