body:
  text: 遯第三十三艮下乾上遯亨小利貞彖曰遯亨遯而亨也剛當位而應與時行也小利貞浸而長也遯之時義大矣哉象曰天下有山遯君子以遠小人不惡而嚴初六遯尾厲勿用有攸往象曰遯尾之厲不往何災也六二執之用黃牛之革莫之勝說象曰執用黃牛固志也九三係遯有疾厲畜臣妾吉象曰係遯之厲有疾憊也畜臣妾吉不可大事也九四好遯君子吉小人否象曰君子好遯小人否也九五嘉遯貞吉象曰嘉遯貞吉以正志也上九肥遯无不利象曰肥遯无不利无所疑也
