body:
  text: 睽第三十八兌下離上睽小事吉彖曰睽火動而上澤動而下二女同居其志不同行說而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉象曰上火下澤睽君子以同而異初九悔亡喪馬勿逐自復見惡人无咎象曰見惡人以辟咎也九二遇主于巷无咎象曰遇主于巷未失道也六三見輿曳其牛掣其人天且劓无初有終象曰見輿曳位不當也无初有終遇剛也九四睽孤遇元夫交孚厲无咎象曰交孚无咎志行也六五悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也上九睽孤見豕負塗載鬼一車先張之弧後說之弧匪寇婚媾往遇雨則吉象曰遇雨之吉群疑亡也
