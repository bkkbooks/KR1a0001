body:
  text: 同人第十三離下乾上同人同人于野亨利涉大川利君子貞彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志象曰天與火同人君子以類族辨物初九同人于門无咎象曰出門同人又誰咎也六二同人于宗吝象曰同人于宗吝道也九三伏戎于莽升其高陵三歲不興象曰伏戎于莽敵剛也三歲不興安行也九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也上九同人于郊无悔象曰同人于郊志未得也
