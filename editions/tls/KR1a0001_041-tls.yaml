body:
  text: 損第四十一兌下艮上損有孚元吉无咎可貞利有攸往曷之用二簋可用享彖曰損損下益上其道上行損而有孚元吉无咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虛與時偕行象曰山下有澤損君子以懲忿窒欲初九已事遄往无咎酌損之象曰已事遄往尚合志也九二利貞征凶弗損益之象曰九二利貞中以為志也六三三人行則損一人一人行則得其友象曰一人行三則疑也六四損其疾使遄有喜无咎象曰損其疾亦可喜也六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也上九弗損益之无咎貞吉利有攸往得臣无家象曰弗損益之大得志也
