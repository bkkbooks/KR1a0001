body:
  text: 離第三十離下離上離利貞亨畜牝牛吉彖曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也象曰明兩作離大人以繼明照于四方初九履錯然敬之无咎象曰履錯之敬以辟咎也六二黃離元吉象曰黃離元吉得中道也九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可久也九四突如其來如焚如死如棄如象曰突如其來如无所容也六五出涕沱若戚嗟若吉象曰六五之吉離王公也上九王用出征有嘉折首獲匪其醜无咎象曰王用出征以正邦也
