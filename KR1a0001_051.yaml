body:
  text: 震第五十一震下震上震亨震來虩虩笑言啞啞震驚百里不喪匕鬯彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚遠而懼邇也不喪匕鬯出可以守宗廟社稷以為祭主也象曰洊雷震君子以恐懼修省初九震來虩虩後笑言啞啞吉象曰震來虩虩恐致福也笑言啞啞後有則也六二震來厲億喪貝躋于九陵勿逐七日得象曰震來厲乘剛也六三震蘇蘇震行無眚象曰震蘇蘇位不當也九四震遂泥象曰震遂泥未光也六五震往來厲意無喪有事象曰震往來厲危行也其事在中大無喪也上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言象曰震索索中未得也雖凶無咎畏鄰戒也
