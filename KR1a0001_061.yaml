body:
  text: 中孚第六十一兌下巽上中孚豚魚吉利涉大川利貞彖曰中孚柔在內而剛得中說而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虛也中孚以利貞乃應乎天也象曰澤上有風中孚君子以議獄緩死初九虞吉有它不燕象曰初九虞吉志未變也九二鳴鶴在陰其子和之我有好爵吾與爾靡之象曰其子和之中心願也六三得敵或鼓或罷或泣或歌象曰或鼓或罷位不當也六四月幾望馬匹亡無咎象曰馬匹亡絶類上也九五有孚攣如無咎象曰有孚攣如位正當也上九翰音登于天貞凶象曰翰音登于天何可長也
