body:
  text: 渙第五十九坎下巽上渙亨王假有廟利涉大川利貞彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也象曰風行水上渙先王以享于帝立廟初六用拯馬壯吉象曰初六之吉順也九二渙奔其機悔亡象曰渙奔其機得願也六三渙其躬無悔象曰渙其躬志在外也六四渙其群元吉渙有丘匪夷所思象曰渙其群元吉光大也九五渙汗其大號渙王居無咎象曰王居無咎正位也上九渙其血去逖出無咎象曰渙其血遠害也
