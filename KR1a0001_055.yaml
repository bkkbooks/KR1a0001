body:
  text: 豐第五十五離下震上豐亨王假之勿憂宜日中彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而況於人乎況於鬼神乎象曰雷電皆至豐君子以折獄致刑初九遇其配主雖旬無咎往有尚象曰雖旬無咎過旬災也六二豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也九三豐其沛日中見沫折其右肱無咎象曰豐其沛不可大事也折其右肱終不可用也九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也六五來章有慶譽吉象曰六五之吉有慶也上六豐其屋蔀其家窺其戶闃其無人三歲不覿凶象曰豐其屋天際翔也窺其戶闃其無人自藏也
