body:
  text: 蒙第四坎下艮上蒙亨匪我求童蒙童蒙來求我初筮告再三瀆瀆則不告利貞彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙來求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也象曰山下出泉蒙君子以果行育德初六發蒙利用刑人用說桎梏以往吝象曰利用刑人以正法也九二苞蒙吉納婦吉子克家象曰子克家剛柔接也六三勿用取女見金夫不有躬無攸利象曰勿用取女行不順也六四困蒙吝象曰困蒙之吝獨遠實也六五童蒙吉象曰童蒙之吉順以巽也上九擊蒙不利為寇利禦寇象曰利用禦寇上下順也
