body:
  text: 剝第二十三坤下艮上剝不利有攸往彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也象曰山附於地剝上以厚下安宅初六剝床以足蔑貞凶象曰剝床以足以滅下也六二剝床以辨蔑貞凶象曰剝床以辨未有與也六三剝之無咎象曰剝之無咎失上下也六四剝床以膚凶象曰剝床以膚切近災也六五貫魚以宮人寵無不利象曰以宮人寵終無尤也上九碩果不食君子得輿小人剝廬象曰君子得輿民所載也小人剝廬終不可用也
