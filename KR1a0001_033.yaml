body:
  text: 遁第三十三艮下乾上遁亨小利貞彖曰遁亨遁而亨也剛當位而應與時行也小利貞浸而長也遁之時義大矣哉象曰天下有山遁君子以遠小人不惡而嚴初六遁尾厲勿用有攸往象曰遁尾之厲不往何災也六二執之用黃牛之革莫之勝說象曰執用黃牛固志也九三係遁有疾厲畜臣妾吉象曰係遁之厲有疾憊也畜臣妾吉不可大事也九四好遁君子吉小人否象曰君子好遁小人否也九五嘉遁貞吉象曰嘉遁貞吉以正志也上九肥遁無不利象曰肥遁無不利無所疑也
