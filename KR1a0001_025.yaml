body:
  text: 無妄第二十五震下乾上無妄元亨利貞其匪正有眚不利有攸往彖曰無妄剛自外來而為主於內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不祐行矣哉象曰天下雷行物與無妄先王以茂對時育萬物初九無妄往吉象曰無妄之往得志也六二不耕穫不菑畬則利有攸往象曰不耕穫未富也六三無妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也九四可貞無咎象曰可貞無咎固有之也九五無妄之疾勿藥有喜象曰無妄之藥不可試也上九無妄行有眚無攸利象曰無妄之行窮之災也
