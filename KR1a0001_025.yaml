body:
  text: 无妄第二十五震下乾上无妄元亨利貞其匪正有眚不利有攸往彖曰无妄剛自外來而為主於內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往无妄之往何之矣天命不祐行矣哉象曰天下雷行物與无妄先王以茂對時育萬物初九无妄往吉象曰无妄之往得志也六二不耕穫不菑畬則利有攸往象曰不耕穫未富也六三无妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也九四可貞无咎象曰可貞无咎固有之也九五无妄之疾勿藥有喜象曰无妄之藥不可試也上九无妄行有眚无攸利象曰无妄之行窮之災也
