body:
  text: 既濟第六十三離下坎上既濟亨小利貞初吉終亂彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也象曰水在火上既濟君子以思患而豫防之初九曳其輪濡其尾無咎象曰曳其輪義無咎也六二婦喪其茀勿逐七日得象曰七日得以中道也九三高宗伐鬼方三年克之小人勿用象曰三年克之憊也六四繻有衣袽終日戒象曰終日戒有所疑也九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也上六濡其首厲象曰濡其首厲何可久也
