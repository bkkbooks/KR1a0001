body:
  text: 隨第十七震下兌上隨元亨利貞無咎彖曰隨剛來而下柔動而說隨大亨貞無咎而天下隨之隨之時義大矣哉象曰澤中有雷隨君子以嚮晦入宴息初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也六二係小子失丈夫象曰係小子弗兼與也六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也九五孚于嘉吉象曰孚于嘉吉位正中也上六拘係之乃從維之王用亨于西山象曰拘係之上窮也
