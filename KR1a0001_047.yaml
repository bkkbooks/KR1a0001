body:
  text: 困第四十七坎下兌上困亨貞大人吉無咎有言不信彖曰困剛掩也險以説困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也象曰澤無水困君子以致命遂志初六臀困于株木入于幽谷三歲不覿象曰入于幽谷幽不明也九二困于酒食朱紱方來利用享祀征凶無咎象曰困于酒食中有慶也六三困于石據于蒺藜入于其宮不見其妻凶象曰據于蒺藜乘剛也入于其宮不見其妻不祥也九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也九五劓刖困于赤紱乃徐有説利用祭祀象曰劓刖志未得也乃徐有説以中直也利用祭祀受福也上六困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也
