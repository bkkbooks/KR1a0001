body:
  text: 大過第二十八巽下兌上大過棟橈利有攸往亨彖曰大過大者過也棟橈本末弱也剛過而中巽而說行利有攸往乃亨大過之時大矣哉象曰澤滅木大過君子以獨立不懼遯世无悶初六藉用白茅无咎象曰藉用白茅柔在下也九二枯楊生稊老夫得其女妻无不利象曰老夫女妻過以相與也九三棟橈凶象曰棟橈之凶不可以有輔也九四棟隆吉有它吝象曰棟隆之吉不橈乎下也九五枯楊生華老婦得其士夫无咎无譽象曰枯楊生華何可久也老婦士夫亦可醜也上六過涉滅頂凶无咎象曰過涉之凶不可咎也
