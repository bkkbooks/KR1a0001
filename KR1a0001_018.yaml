body:
  text: 蠱第十八巽下艮上蠱元亨利涉大川先甲三日後甲三日彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也象曰山下有風蠱君子以振民育德初六幹父之蠱有子考無咎厲終吉象曰幹父之蠱意承考也九二幹母之蠱不可貞象曰幹母之蠱得中道也九三幹父之蠱小有悔無大咎象曰幹父之蠱終無咎也六四裕父之蠱往見吝象曰裕父之蠱往未得也六五幹父之蠱用譽象曰幹父用譽承以德也上九不事王侯高尚其事象曰不事王侯志可則也
