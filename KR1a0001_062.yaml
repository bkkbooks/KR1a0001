body:
  text: 小過第六十二艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉彖曰小過亨小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉初六飛鳥以凶象曰飛鳥以凶不可如何也六二過其祖遇其妣不及其君遇其臣無咎象曰不及其君臣不可過也九三弗過防之從或戕之凶象曰從或戕之凶如何也九四無咎弗過遇之往厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也六五密雲不雨自我西郊公弋取彼在穴象曰密雲不雨已上也上六弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之已亢也
