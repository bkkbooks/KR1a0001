body:
  text: 咸第三十一艮下兌上咸亨利貞取女吉彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣象曰山上有澤咸君子以虛受人初六咸其拇象曰咸其拇志在外也六二咸其腓凶居吉象曰雖凶居吉順不害也九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也九五咸其脢无悔象曰咸其脢志末也上六咸其輔頰舌象曰咸其輔頰舌滕口說也
