body:
  text: 漸第五十三艮下巽上漸女歸吉利貞彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也象曰山上有木漸君子以居賢德善俗初六鴻漸于干小子厲有言無咎象曰小子之厲義無咎也六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也九三鴻漸于陸夫征不復婦孕不育凶利禦寇象曰夫征不復離群醜也婦孕不育失其道也利用禦寇順相保也六四鴻漸于木或得其桷無咎象曰或得其桷順以巽也九五鴻漸于陵婦三歲不孕終莫之勝吉象曰終莫之勝吉得所願也上九鴻漸于陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也
