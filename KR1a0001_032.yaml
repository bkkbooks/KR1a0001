body:
  text: 恆第三十二巽下震上恆亨無咎利貞利有攸往彖曰恆久也剛上而柔下雷風相與巽而動剛柔皆應恆恆亨無咎利貞久於其道也天地之道恆久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恆而天地萬物之情可見矣象曰雷風恆君子以立不易方初六浚恆貞凶無攸利象曰浚恆之凶始求深也九二悔亡象曰九二悔亡能久中也九三不恆其德或承之羞貞吝象曰不恆其德無所容也九四田無禽象曰久非其位安得禽也六五恆其德貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也上六振恆凶象曰振恆在上大無功也
