body:
  text: 升第四十六巽下坤上升元亨用見大人勿恤南征吉彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也象曰地中生木升君子以順德積小以高大初六允升大吉象曰允升大吉上合志也九二孚乃利用禴無咎象曰九二之孚有喜也九三升虛邑象曰升虛邑無所疑也六四王用亨于岐山吉無咎象曰王用亨于岐山順事也六五貞吉升階象曰貞吉升階大得志也上六冥升利于不息之貞象曰冥升在上消不富也
