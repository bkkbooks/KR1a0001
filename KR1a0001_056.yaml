body:
  text: 旅第五十六艮下離上旅小亨旅貞吉彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉象曰山上有火旅君子以明慎用刑而不留獄初六旅瑣瑣斯其所取災象曰旅瑣瑣志窮災也六二旅即次懷其資得童僕貞象曰得童僕貞終無尤也九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也六五射雉一矢亡終以譽命象曰終以譽命上逮也上九鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也
