body:
  text: 臨第十九兌下坤上臨元亨利貞至于八月有凶彖曰臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不久也象曰澤上有地臨君子以教思無窮容保民無疆初九咸臨貞吉象曰咸臨貞吉志行正也九二咸臨吉無不利象曰咸臨吉無不利未順命也六三甘臨無攸利既憂之無咎象曰甘臨位不當也既憂之咎不長也六四至臨無咎象曰至臨無咎位當也六五知臨大君之宜吉象曰大君之宜行中之謂也上六敦臨吉無咎象曰敦臨之吉志在內也
