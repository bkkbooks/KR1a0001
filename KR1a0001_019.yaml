body:
  text: 臨第十九兌下坤上臨元亨利貞至于八月有凶彖曰臨剛浸而長說而順剛中而應大亨以正天之道也至于八月有凶消不久也象曰澤上有地臨君子以教思无窮容保民无疆初九咸臨貞吉象曰咸臨貞吉志行正也九二咸臨吉无不利象曰咸臨吉无不利未順命也六三甘臨无攸利既憂之无咎象曰甘臨位不當也既憂之咎不長也六四至臨无咎象曰至臨无咎位當也六五知臨大君之宜吉象曰大君之宜行中之謂也上六敦臨吉无咎象曰敦臨之吉志在內也
