body:
  text: 艮第五十二艮下艮上艮其背不獲其身行其庭不見其人无咎彖曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人无咎也象曰兼山艮君子以思不出其位初六艮其趾无咎利永貞象曰艮其趾未失正也六二艮其腓不拯其隨其心不快象曰不拯其隨未退聽也九三艮其限列其夤厲薰心象曰艮其限危薰心也六四艮其身无咎象曰艮其身止諸躬也六五艮其輔言有序悔亡象曰艮其輔以中正也上九敦艮吉象曰敦艮之吉以厚終也
