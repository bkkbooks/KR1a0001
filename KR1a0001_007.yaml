body:
  text: 師第七坎下坤上師貞丈人吉无咎彖曰師眾也貞正也能以眾正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣象曰地中有水師君子以容民畜眾初六師出以律否臧凶象曰師出以律失律凶也九二在師中吉无咎王三錫命象曰在師中吉承天寵也王三錫命懷萬邦也六三師或輿尸凶象曰師或輿尸大无功也六四師左次无咎象曰左次无咎未失常也六五田有禽利執言无咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也
