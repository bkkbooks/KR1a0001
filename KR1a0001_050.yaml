body:
  text: 鼎第五十巽下離上鼎元吉亨彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨象曰木上有火鼎君子以正位凝命初六鼎顛趾利出否得妾以其子無咎象曰鼎顛趾未悖也利出否以從貴也九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終無尤也九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也六五鼎黃耳金鉉利貞象曰鼎黃耳中以為實也上九鼎玉鉉大吉無不利象曰玉鉉在上剛柔節也
