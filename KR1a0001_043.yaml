body:
  text: 夬第四十三乾下兌上夬揚于王庭孚號有厲告自邑不利即戎利有攸往彖曰夬決也剛決柔也健而説決而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也象曰澤上於天夬君子以施祿及下居德則忌初九壯于前趾往不勝為咎象曰不勝而往咎也九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也九三壯于頄有凶君子夬夬獨行遇雨若濡有慍無咎象曰君子夬夬終無咎也九四臀無膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也九五莧陸夬夬中行無咎象曰中行無咎中未光也上六無號終有凶象曰無號之凶終不可長也
