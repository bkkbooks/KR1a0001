body:
  text: 否第十二坤下乾上否否之匪人不利君子貞大往小來彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下无邦也內陰而外陽內柔而外剛內小人而外君子小人道長君子道消也象曰天地不交否君子以儉德辟難不可榮以祿初六拔茅茹以其彙貞吉亨象曰拔茅貞吉志在君也六二苞承小人吉大人否亨象曰大人否亨不亂群也六三苞羞象曰苞羞位不當也九四有命无咎疇離祉象曰有命无咎志行也九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也上九傾否先否後喜象曰否終則傾何可長也
