body:
  text: 觀第二十坤下巽上觀盥而不薦有孚顒若彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣象曰風行地上觀先王以省方觀民設教初六童觀小人無咎君子吝象曰初六童觀小人道也六二窺觀利女貞象曰窺觀女貞亦可醜也六三觀我生進退象曰觀我生進退未失道也六四觀國之光利用賓于王象曰觀國之光尚賓也九五觀我生君子無咎象曰觀我生觀民也上九觀其生君子無咎象曰觀其生志未平也
