body:
  text: 兌第五十八兌下兌上兌亨利貞彖曰兌説也剛中而柔外説以利貞是以順乎天而應乎人説以先民民忘其勞説以犯難民忘其死説之大民勸矣哉象曰麗澤兌君子以朋友講習初九和兌吉象曰和兌之吉行未疑也九二孚兌吉悔亡象曰孚兌之吉信志也六三來兌凶象曰來兌之凶位不當也九四商兌未寧介疾有喜象曰九四之喜有慶也九五孚于剝有厲象曰孚于剝位正當也上六引兌象曰上六引兌未光也
