body:
  text: 大壯第三十四乾下震上大壯利貞彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣象曰雷在天上大壯君子以非禮弗履初九壯于趾征凶有孚象曰壯于趾其孚窮也九二貞吉象曰九二貞吉以中也九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子用罔也九四貞吉悔亡藩決不羸壯于大輿之輹象曰藩決不羸尚往也六五喪羊于易无悔象曰喪羊于易位不當也上六羝羊觸藩不能退不能遂无攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也
