body:
  text: 大有第十四乾下離上大有元亨彖曰大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨象曰火在天上大有君子以遏惡揚善順天休命初九無交害匪咎艱則無咎象曰大有初九無交害也九二大車以載有攸往無咎象曰大車以載積中不敗也九三公用亨于天子小人弗克象曰公用亨于天子小人害也九四匪其彭無咎象曰匪其彭無咎明辨晢也六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而無備也上九自天祐之吉無不利象曰大有上吉自天祐也
